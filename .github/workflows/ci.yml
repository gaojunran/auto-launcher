name: ci

on: [push, pull_request]

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run CI tasks
        run: mise run ci
